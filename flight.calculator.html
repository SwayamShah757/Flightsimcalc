<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flight Utility Pro</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #111827;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .container {
      background-color: #1f2937;
      padding: 25px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    /* Tabs Styling */
    .tabs {
      display: flex;
      gap: 5px;
      margin-bottom: 20px;
      border-bottom: 1px solid #374151;
      padding-bottom: 10px;
    }

    .tab-btn {
      flex: 1;
      padding: 8px;
      font-size: 12px;
      background: #374151;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      border-radius: 4px;
      transition: 0.3s;
    }

    .tab-btn.active {
      background: #2563eb;
      color: white;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Form Styling */
    label { display: block; margin-top: 15px; margin-bottom: 5px; font-size: 14px; color: #cbd5e1; }
    
    input {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
      background: #f8fafc;
    }

    button.calc-btn {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    .result {
      margin-top: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      min-height: 40px;
    }

    /* Stopwatch Styling */
    .stopwatch-display {
      color: #10b981;
      font-family: monospace;
      font-size: 32px;
      text-align: center;
      margin: 15px 0;
    }
    
    .timer-controls { display: flex; gap: 10px; }
    .t-btn { flex: 1; padding: 10px; border-radius: 6px; border: none; cursor: pointer; color: white; }
    .start { background: #10b981; }
    .reset { background: #ef4444; }

  </style>
</head>
<body>

  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" onclick="openTab(event, 'ete-calc')">ETE Calc</button>
      <button class="tab-btn" onclick="openTab(event, 'speed-calc')">Target Speed</button>
      <button class="tab-btn" onclick="openTab(event, 'timer-tab')">Stopwatch</button>
    </div>

    <div id="ete-calc" class="tab-content active">
      <label>Distance (nm)</label>
      <input type="number" id="ete-dist" placeholder="e.g. 50">
      <label>Ground Speed (kts)</label>
      <input type="number" id="ete-speed" placeholder="e.g. 120">
      <button class="calc-btn" onclick="calcETE()">Calculate Time</button>
      <div class="result" id="ete-result">---</div>
    </div>

    <div id="speed-calc" class="tab-content">
      <label>Distance to Dest (nm)</label>
      <input type="number" id="target-dist" placeholder="e.g. 50">
      <label>Target Time (minutes)</label>
      <input type="number" id="target-time" placeholder="e.g. 23">
      <button class="calc-btn" onclick="calcTargetSpeed()">Calculate Speed</button>
      <div class="result" id="speed-result">---</div>
    </div>

    <div id="timer-tab" class="tab-content">
      <div class="stopwatch-display" id="stopwatch">00:00:00</div>
      <div class="timer-controls">
        <button class="t-btn start" id="startStopBtn" onclick="toggleTimer()">Start</button>
        <button class="t-btn reset" onclick="resetTimer()">Reset</button>
      </div>
    </div>
  </div>

  <script>
    // Tab Logic
    function openTab(evt, tabName) {
      const contents = document.getElementsByClassName("tab-content");
      for (let x of contents) x.classList.remove("active");
      
      const buttons = document.getElementsByClassName("tab-btn");
      for (let x of buttons) x.classList.remove("active");

      document.getElementById(tabName).classList.add("active");
      evt.currentTarget.classList.add("active");
    }

    // Calculator Logic (ETE)
    function calcETE() {
      const d = parseFloat(document.getElementById("ete-dist").value);
      const s = parseFloat(document.getElementById("ete-speed").value);
      if (!d || !s) return;

      const totalMins = Math.round((d / s) * 60);
      if (totalMins >= 60) {
        const h = Math.floor(totalMins / 60);
        const m = totalMins % 60;
        document.getElementById("ete-result").innerHTML = `${h}h ${m}m <small>(${totalMins}m)</small>`;
      } else {
        document.getElementById("ete-result").innerText = `${totalMins} minutes`;
      }
    }

    // Target Speed Logic (The new function you asked for)
    function calcTargetSpeed() {
      const d = parseFloat(document.getElementById("target-dist").value);
      const t = parseFloat(document.getElementById("target-time").value);

      if (d > 0 && t > 0) {
        // Formula: Speed = Distance / (Minutes / 60)
        const speed = Math.round(d / (t / 60));
        document.getElementById("speed-result").innerText = `${speed} knots`;
      } else {
        document.getElementById("speed-result").innerText = "Invalid input";
      }
    }

    // Stopwatch Logic
    let startTime, elapsedTime = 0, timerInterval, isRunning = false;

    function toggleTimer() {
      if (!isRunning) {
        isRunning = true;
        startTime = Date.now() - elapsedTime;
        timerInterval = setInterval(() => {
          elapsedTime = Date.now() - startTime;
          let s = Math.floor((elapsedTime / 1000) % 60);
          let m = Math.floor((elapsedTime / 60000) % 60);
          let h = Math.floor(elapsedTime / 3600000);
          document.getElementById("stopwatch").innerText = 
            `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }, 1000);
        document.getElementById("startStopBtn").innerText = "Stop";
      } else {
        isRunning = false;
        clearInterval(timerInterval);
        document.getElementById("startStopBtn").innerText = "Start";
      }
    }

    function resetTimer() {
      clearInterval(timerInterval);
      isRunning = false;
      elapsedTime = 0;
      document.getElementById("stopwatch").innerText = "00:00:00";
      document.getElementById("startStopBtn").innerText = "Start";
    }
  </script>
</body>
</html>
