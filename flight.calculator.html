<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flight Time Calculator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #111827;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background-color: #1f2937;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 24px;
    }

    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #1d4ed8;
    }

    .result {
      margin-top: 20px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .formula {
      margin-top: 15px;
      font-size: 14px;
      color: #cbd5e1;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Flight Time Calculator</h1>

    <label for="distance">Distance to Destination (nm)</label>
    <input type="number" id="distance" placeholder="e.g. 21">

    <label for="speed">Aircraft Speed (kts)</label>
    <input type="number" id="speed" placeholder="e.g. 118">

    <button onclick="calculateTime()">Calculate</button>

    <div class="result" id="result"></div>

    <div class="formula">
      Time = (Distance ÷ Speed) × 60
    </div>
  </div>

  <script>
    function calculateTime() {
      const distance = parseFloat(document.getElementById("distance").value);
      const speed = parseFloat(document.getElementById("speed").value);

      if (distance <= 0 || speed <= 0 || isNaN(distance) || isNaN(speed)) {
        document.getElementById("result").innerText =
          "Please enter valid numbers.";
        return;
      }

      // Time in hours converted to minutes
      const timeMinutes = (distance / speed) * 60;

      // Rounded to nearest whole minute
      const roundedTime = Math.round(timeMinutes);

      document.getElementById("result").innerText =
        `≈ ${roundedTime} minute(s) remaining`;
    }
  </script>

</body>
</html>
